<!DOCTYPE html>
<html>

<head>
    <title>Hotel Chatbot</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Smooth dark gradient background */
            background: radial-gradient(circle at top, #1a1a1a, #000);
        }

        .container {
            width: 750px;
            padding: 45px;

            border-radius: 25px;

            /* Glass effect */
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.12);

            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.6),
                0 0 60px rgba(255, 255, 255, 0.05);

            text-align: center;

            transition: 0.3s ease;
        }

        .container:hover {
            transform: translateY(-3px);
        }

        h1 {
            color: #ffffff;
            font-size: 40px;
            margin-bottom: 10px;

            letter-spacing: 1px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 30px;
            font-size: 15px;
        }

        form {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }

        input[type="text"] {
            width: 520px;
            height: 52px;

            border-radius: 14px;

            border: 1px solid rgba(255, 255, 255, 0.15);

            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);

            color: white;

            padding: 0 18px;
            font-size: 16px;

            outline: none;

            transition: 0.3s;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input[type="text"]:focus {
            border: 1px solid rgba(0, 200, 255, 0.6);
            box-shadow: 0 0 12px rgba(0, 200, 255, 0.25);
        }

        input[type="submit"] {
            width: 120px;
            height: 52px;

            border: none;
            border-radius: 14px;

            background: linear-gradient(135deg, #111, #2a2a2a);

            color: white;
            font-size: 15px;
            font-weight: 500;

            cursor: pointer;

            transition: 0.3s ease;
        }

        input[type="submit"]:hover {
            background: linear-gradient(135deg, #222, #444);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.08);
        }

        /* Response box */
        .response {
            margin-top: 25px;
            padding: 15px;

            border-radius: 12px;

            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);

            color: rgba(255, 255, 255, 0.85);

            text-align: left;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Hotel AI Assistant</h1>

        <p class="subtitle">
            Ask about rooms, pricing, availability, and hotel services.
        </p>

        <form action="/response" method="post">

            <input type="text" name="n1" placeholder="Ask your question..." required>

            <input type="submit" value="Send">

        </form>

        {% if data %}
        <div class="response">
            {{ data }}
        </div>
        {% endif %}

    </div>

</body>

</html>
